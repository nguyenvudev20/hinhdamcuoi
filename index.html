<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slideshow</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,300&display=swap');

    :root {
      --bg: #080808;
      --border: rgba(255,255,255,0.07);
      --text: #e2ddd7;
      --muted: rgba(226,221,215,0.32);
      --accent: #c9a96e;
      --trans: 0.65s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      user-select: none;
      cursor: none;
    }

    #stage { position: fixed; inset: 0; }

    .slide {
      position: absolute; inset: 0;
      opacity: 0; z-index: 0;
      transition: opacity var(--trans);
      display: flex; align-items: center; justify-content: center;
    }
    .slide.active { opacity: 1; z-index: 1; }
    .slide img {
      width: 100%; height: 100%;
      object-fit: contain; display: block;
    }

    #cursor {
      position: fixed; z-index: 9999; pointer-events: none;
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(201,169,110,0.55);
      transform: translate(-50%,-50%);
      transition: transform 0.1s, opacity 0.3s;
      mix-blend-mode: difference;
    }
    #cursor.click { transform: translate(-50%,-50%) scale(0.55); }
    #cursor.hide  { opacity: 0; }

    #hud {
      position: fixed; inset: 0; z-index: 20;
      pointer-events: none;
      opacity: 0; transition: opacity 0.35s;
    }
    #hud.show { opacity: 1; }

    #top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 20px 28px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
    }
    #title-label {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-weight: 300;
      font-size: 1rem; color: var(--accent);
    }
    #counter {
      font-size: 0.6rem; letter-spacing: 0.22em; color: var(--muted);
    }

    .nav-zone {
      position: absolute; top: 0; bottom: 0; width: 18%;
      pointer-events: all; cursor: none;
      display: flex; align-items: center;
      transition: background 0.25s;
    }
    #zone-prev { left: 0;  justify-content: flex-start; padding-left: 18px; }
    #zone-next { right: 0; justify-content: flex-end;   padding-right: 18px; }
    .nav-zone:hover { background: rgba(0,0,0,0.2); }

    .nav-icon {
      opacity: 0; transition: opacity 0.25s;
      width: 42px; height: 42px;
      border: 1px solid rgba(201,169,110,0.3);
      color: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }
    .nav-zone:hover .nav-icon { opacity: 1; }
    .nav-icon svg { width: 16px; height: 16px; }

    #bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 18px 26px 22px;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
      pointer-events: all;
      display: flex; flex-direction: column; gap: 12px;
    }

    #progress-track {
      width: 100%; height: 1.5px;
      background: rgba(255,255,255,0.1);
      position: relative; cursor: pointer;
    }
    #progress-fill {
      height: 100%; background: var(--accent);
      transition: width 0.3s ease; pointer-events: none;
    }
    #progress-thumb {
      position: absolute; top: 50%;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #controls {
      display: flex; align-items: center; justify-content: space-between;
    }
    .ctrl-group { display: flex; align-items: center; gap: 5px; }

    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.57rem; letter-spacing: 0.13em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }
    .btn.on    { color: var(--accent); border-color: rgba(201,169,110,0.4); }
    .btn svg   { width: 11px; height: 11px; flex-shrink: 0; }

    .speed-label { font-size: 0.54rem; color: var(--muted); letter-spacing: 0.1em; }
    input[type=range] { width: 68px; accent-color: var(--accent); cursor: pointer; }

    #thumb-strip {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 30;
      padding: 10px 14px 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, transparent 100%);
      display: flex; align-items: center; gap: 5px;
      overflow-x: auto; scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }
    #thumb-strip.open { transform: translateY(0); pointer-events: all; }
    #thumb-strip::-webkit-scrollbar { height: 2px; }
    #thumb-strip::-webkit-scrollbar-thumb { background: var(--border); }

    .thumb {
      flex-shrink: 0; width: 68px; height: 46px;
      border: 1.5px solid transparent;
      cursor: pointer; overflow: hidden;
      opacity: 0.38; transition: all 0.18s;
    }
    .thumb:hover { opacity: 0.7; }
    .thumb.on    { border-color: var(--accent); opacity: 1; }
    .thumb img   { width: 100%; height: 100%; object-fit: cover; display: block; }

    #hint {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      font-size: 0.54rem; color: var(--muted); letter-spacing: 0.18em;
      text-transform: uppercase; z-index: 5; pointer-events: none;
      opacity: 0; transition: opacity 0.5s; white-space: nowrap;
    }
    #hint.show { opacity: 1; }

    .err-badge {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.5rem; color: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

<div id="cursor"></div>
<div id="stage"></div>

<div id="hud">
  <div id="top-bar">
    <span id="title-label">Slideshow</span>
    <span id="counter">001 / 500</span>
  </div>

  <div class="nav-zone" id="zone-prev">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 19l-7-7 7-7"/></svg>
    </div>
  </div>
  <div class="nav-zone" id="zone-next">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5l7 7-7 7"/></svg>
    </div>
  </div>

  <div id="bottom-bar">
    <div id="progress-track">
      <div id="progress-fill"></div>
      <div id="progress-thumb"></div>
    </div>
    <div id="controls">
      <div class="ctrl-group">
        <button class="btn" id="btn-auto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M10 8l6 4-6 4V8z"/>
          </svg>Auto
        </button>
        <button class="btn" id="btn-shuffle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>
          </svg>Shuffle
        </button>
        <button class="btn" id="btn-thumbs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="7" height="5" rx="1"/>
            <rect x="14" y="3" width="7" height="5" rx="1"/>
            <rect x="3" y="12" width="7" height="5" rx="1"/>
            <rect x="14" y="12" width="7" height="5" rx="1"/>
          </svg>Thumbs
        </button>
      </div>
      <div class="ctrl-group">
        <span class="speed-label">Speed</span>
        <input type="range" id="speed" min="1" max="10" value="4" />
        <button class="btn" id="btn-fs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
          </svg>Fullscreen
        </button>
      </div>
    </div>
  </div>
</div>

<div id="thumb-strip"></div>
<div id="hint">← → di chuyển &nbsp;·&nbsp; Space play/pause &nbsp;·&nbsp; F fullscreen &nbsp;·&nbsp; S shuffle</div>

<script>
// ═══════════════════════════
//  CONFIG
// ═══════════════════════════
const TOTAL     = 500;
const IMG_DIR   = 'images/';
const PAD       = 3;          // 001, 002 ... đổi thành 4 nếu ảnh là 0001.jpg
const EXT       = 'jpg';      // đổi thành png / jpeg nếu cần
const SPEEDS    = [9000,7000,5000,4000,3000,2500,2000,1500,1000,600];

// Tạo mảng đường dẫn
const FILES = Array.from({length: TOTAL}, (_, i) =>
  IMG_DIR + 'Henry'+String(i + 1).padStart(PAD, '0') + '.' + EXT
);

// ═══════════════════════════
//  STATE
// ═══════════════════════════
let order   = FILES.map((_,i) => i);
let pos     = 0;
let playing = false;
let autoT   = null;
let shuffled = false;
let thumbsOpen = false;

const curIdx = () => order[pos];

// ═══════════════════════════
//  ELEMENTS
// ═══════════════════════════
const $stage  = document.getElementById('stage');
const $hud    = document.getElementById('hud');
const $count  = document.getElementById('counter');
const $fill   = document.getElementById('progress-fill');
const $pthumb = document.getElementById('progress-thumb');
const $tstrip = document.getElementById('thumb-strip');
const $hint   = document.getElementById('hint');
const $cursor = document.getElementById('cursor');
const btnAuto = document.getElementById('btn-auto');
const btnShuf = document.getElementById('btn-shuffle');
const btnTh   = document.getElementById('btn-thumbs');
const btnFs   = document.getElementById('btn-fs');
const speedEl = document.getElementById('speed');

// ═══════════════════════════
//  BUILD SLIDES
// ═══════════════════════════
const slideEls = [];

FILES.forEach((src, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  div.dataset.i = i;
  $stage.appendChild(div);
  slideEls.push(div);
});

function injectImg(i) {
  const el = slideEls[i];
  if (!el || el.querySelector('img,div')) return;
  const img = document.createElement('img');
  img.src = FILES[i]; img.alt = '';
  img.onerror = () => { el.innerHTML = `<div class="err-badge">${FILES[i]}</div>`; };
  el.appendChild(img);
}

function preload(i) {
  [-1, 0, 1, 2, 3].forEach(d => {
    const n = i + d;
    if (n >= 0 && n < FILES.length) injectImg(n);
  });
}

// ═══════════════════════════
//  NAVIGATION
// ═══════════════════════════
function goTo(newPos) {
  const old = curIdx();
  slideEls[old]?.classList.remove('active');

  pos = ((newPos % order.length) + order.length) % order.length;
  const idx = curIdx();

  injectImg(idx);
  preload(idx);
  slideEls[idx]?.classList.add('active');
  updateHUD();
  syncThumb(idx);
}

const next = () => goTo(pos + 1);
const prev = () => goTo(pos - 1);

function updateHUD() {
  const idx = curIdx();
  $count.textContent =
    String(idx + 1).padStart(3,'0') + ' / ' + String(FILES.length).padStart(3,'0');
  const pct = FILES.length > 1 ? (pos / (order.length - 1)) * 100 : 0;
  $fill.style.width   = pct + '%';
  $pthumb.style.left  = pct + '%';
}

// ═══════════════════════════
//  AUTOPLAY
// ═══════════════════════════
function getSpeed() { return SPEEDS[parseInt(speedEl.value) - 1]; }
function startT()  { clearInterval(autoT); autoT = setInterval(next, getSpeed()); }
function stopT()   { clearInterval(autoT); }
function resetT()  { if (playing) { stopT(); startT(); } }

btnAuto.addEventListener('click', () => {
  playing = !playing;
  btnAuto.classList.toggle('on', playing);
  playing ? startT() : stopT();
});
speedEl.addEventListener('input', resetT);

// ═══════════════════════════
//  SHUFFLE
// ═══════════════════════════
btnShuf.addEventListener('click', () => {
  shuffled = !shuffled;
  btnShuf.classList.toggle('on', shuffled);
  const cur = curIdx();
  order = FILES.map((_,i) => i);
  if (shuffled) {
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
  }
  pos = order.indexOf(cur);
  if (pos < 0) pos = 0;
  updateHUD();
});

// ═══════════════════════════
//  THUMBNAILS
// ═══════════════════════════
FILES.forEach((src, i) => {
  const t   = document.createElement('div');
  t.className = 'thumb'; t.dataset.i = i;
  const img = document.createElement('img');
  img.src = src; img.loading = 'lazy'; img.alt = '';
  t.appendChild(img);
  t.addEventListener('click', () => {
    const p = order.indexOf(i);
    goTo(p >= 0 ? p : 0);
  });
  $tstrip.appendChild(t);
});

function syncThumb(idx) {
  $tstrip.querySelectorAll('.thumb').forEach(t =>
    t.classList.toggle('on', +t.dataset.i === idx)
  );
  $tstrip.querySelector('.thumb.on')
    ?.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
}

btnTh.addEventListener('click', () => {
  thumbsOpen = !thumbsOpen;
  $tstrip.classList.toggle('open', thumbsOpen);
  btnTh.classList.toggle('on', thumbsOpen);
});

// ═══════════════════════════
//  FULLSCREEN
// ═══════════════════════════
btnFs.addEventListener('click', toggleFs);
function toggleFs() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
document.addEventListener('fullscreenchange', () =>
  btnFs.classList.toggle('on', !!document.fullscreenElement)
);

// ═══════════════════════════
//  PROGRESS CLICK
// ═══════════════════════════
document.getElementById('progress-track').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct  = (e.clientX - rect.left) / rect.width;
  goTo(Math.round(pct * (order.length - 1)));
});

// ═══════════════════════════
//  HUD VISIBILITY
// ═══════════════════════════
let hudT = null;
function showHud() {
  $hud.classList.add('show');
  clearTimeout(hudT);
  hudT = setTimeout(() => $hud.classList.remove('show'), 3200);
}
document.addEventListener('mousemove', showHud);
document.addEventListener('touchstart', showHud, { passive: true });

// ═══════════════════════════
//  CUSTOM CURSOR
// ═══════════════════════════
document.addEventListener('mousemove', e => {
  $cursor.style.left = e.clientX + 'px';
  $cursor.style.top  = e.clientY + 'px';
  $cursor.classList.remove('hide');
});
document.addEventListener('mouseleave', () => $cursor.classList.add('hide'));
document.addEventListener('mousedown',  () => $cursor.classList.add('click'));
document.addEventListener('mouseup',    () => $cursor.classList.remove('click'));

// ═══════════════════════════
//  KEYBOARD
// ═══════════════════════════
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowRight': case 'ArrowDown':  next(); showHud(); break;
    case 'ArrowLeft':  case 'ArrowUp':   prev(); showHud(); break;
    case ' ':  e.preventDefault(); btnAuto.click(); break;
    case 'f': case 'F': toggleFs(); break;
    case 't': case 'T': btnTh.click(); break;
    case 's': case 'S': btnShuf.click(); break;
  }
});

// ═══════════════════════════
//  TOUCH SWIPE
// ═══════════════════════════
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) dx < 0 ? next() : prev();
});

// ═══════════════════════════
//  NAV ZONES
// ═══════════════════════════
document.getElementById('zone-prev').addEventListener('click', prev);
document.getElementById('zone-next').addEventListener('click', next);

// ═══════════════════════════
//  INIT
// ═══════════════════════════
goTo(0);
showHud();
setTimeout(() => {
  $hint.classList.add('show');
  setTimeout(() => $hint.classList.remove('show'), 4500);
}, 1000);
</script>
</body>
</html>
